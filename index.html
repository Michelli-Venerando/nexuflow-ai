<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nexuflow</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111827;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #dashboard {
      display: none;
    }
  </style>
</head>
<body>

<div class="container" id="login">
  <h2>Login Nexuflow</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="erro" style="color:red;"></p>
</div>

<div class="container" id="dashboard">
  <h2>Dashboard</h2>

  <p id="nome"></p>
  <p id="empresa"></p>

  <button onclick="carregarTransacoes()">Ver Transações</button>

  <ul id="lista"></ul>

  <button onclick="logout()" style="background:#ef4444;">Sair</button>
</div>

<script>
  const SUPABASE_URL = "https://zwwdeetzpwrbtiyvfsjj.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3d2RlZXR6cHdyYnRpeXZmc2pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODY4MTksImV4cCI6MjA4OTg2MjgxOX0.OKuhe5_umIl6R-F41FjWr_NctpO6T8qZ7KAhHVuGBZk";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 🔐 LOGIN
  async function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { data, error } = await supabase.auth.signInWithPassword({
      email: email,
      password: senha
    });

    if (error) {
      document.getElementById("erro").innerText = "Login inválido";
      return;
    }

    const token = data.session.access_token;

    // 🔥 SALVA TOKEN
    localStorage.setItem("token", token);

    carregarPerfil(token);
  }

  // 👤 PERFIL
  async function carregarPerfil(token) {
    try {
      const response = await fetch("/perfil", {
        headers: {
          Authorization: "Bearer " + token
        }
      });

      const data = await response.json();

      if (!data) {
        document.getElementById("erro").innerText = "Erro ao carregar perfil";
        return;
      }

      document.getElementById("login").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      // 🔥 FORMATA COMO VOCÊ QUERIA
      const nomeFinal =
        (data.perfil || "perfil") + " - " +
        (data.empresa || "Empresa") + " - " +
        (data.nome || data.email);

      document.getElementById("nome").innerText = nomeFinal;
      document.getElementById("empresa").innerText = "";

      window.TOKEN = token;

    } catch (erro) {
      console.error(erro);
      document.getElementById("erro").innerText = "Erro no servidor";
    }
  }

  // 💰 TRANSAÇÕES
  async function carregarTransacoes() {
    try {
      const response = await fetch("/transacoes", {
        headers: {
          Authorization: "Bearer " + window.TOKEN
        }
      });

      const data = await response.json();

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      if (!data || data.length === 0) {
        lista.innerHTML = "<li>Sem dados</li>";
        return;
      }

      data.forEach(t => {
        const li = document.createElement("li");
        li.innerText = `${t.descricao} - R$ ${t.valor}`;
        lista.appendChild(li);
      });

    } catch (erro) {
      console.error(erro);
      alert("Erro ao carregar transações");
    }
  }

  // 🚪 LOGOUT
  function logout() {
    localStorage.removeItem("token");
    location.reload();
  }

  // 🔄 AUTO LOGIN
  if (localStorage.getItem("token")) {
    carregarPerfil(localStorage.getItem("token"));
  }
</script>

</body>
</html>
