<!DOCTYPE html>
<html>
<head>
  <title>Painel Financeiro - Nexuflow</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    #login-container, #reset-container {
      height: 100vh;
      background: url("/Imagens/plano-fundo.png") no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #login-container::before, #reset-container::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .login-box {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.95);
      padding: 40px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .erro {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
    }

    h1 { text-align: center; }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      padding: 20px;
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      margin-top: 30px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-container">
  <div class="login-box">
    <h2>Nexuflow</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <p id="erroLogin" class="erro"></p>

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- RESET -->
<div id="reset-container" style="display:none;">
  <div class="login-box">
    <h2>Nova Senha</h2>
    <input id="novaSenha" type="password" placeholder="Digite a nova senha">
    <p id="erroSenha" class="erro"></p>
    <button onclick="alterarSenha()">Salvar</button>
  </div>
</div>

<!-- APP -->
<div id="boasVindas" style="margin:10px; font-weight:bold;"></div>

<div id="app" style="display:none; padding:20px;">

  <button onclick="logout()" style="float:right;">Sair</button>

  <h1>💰 Painel Financeiro Nexuflow</h1>

  <!-- MENU -->
  <div style="margin-bottom:20px;">
    <button onclick="abrirPainel('dashboard')">Dashboard</button>
    <button id="menu-admin" onclick="abrirPainel('usuarios')" style="display:none;">
      Gestão de Usuários
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="tela-dashboard">
    <div class="cards">
      <div class="card">A Pagar: R$ <span id="pagar">0</span></div>
      <div class="card">A Receber: R$ <span id="receber">0</span></div>
      <div class="card">Saldo: R$ <span id="saldo">0</span></div>
    </div>

    <canvas id="grafico"></canvas>

    <table>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Descrição</th>
          <th>Valor</th>
          <th>Data</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

  <!-- ADMIN -->
  <div id="admin-panel" style="display:none;">
    <h3>Gestão de Usuários</h3>

    <input id="novoNome" placeholder="Nome"><br><br>
    <input id="novoEmail" placeholder="Email"><br><br>

    <select id="novoPerfil">
      <option value="pagar">Contas a Pagar</option>
      <option value="receber">Contas a Receber</option>
      <option value="master">Master</option>
    </select><br><br>

    <button onclick="criarUsuario()">Criar Usuário</button>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>

const { createClient } = supabase;

const supabaseClient = createClient(
  "https://zwwdeetzpwrbtiyvfsjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3d2RlZXR6cHdyYnRpeXZmc2pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODY4MTksImV4cCI6MjA4OTg2MjgxOX0.OKuhe5_umIl6R-F41FjWr_NctpO6T8qZ7KAhHVuGBZk"
);

let grafico;

// LOGIN CHECK
async function verificarLogin() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    localStorage.setItem("token", data.session.access_token);
    document.getElementById("login-container").style.display = "none";
    document.getElementById("app").style.display = "block";
    carregar();
    mostrarUsuario();
  }
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    document.getElementById("erroLogin").innerText = "Email ou senha inválidos";
    return;
  }

  localStorage.setItem("token", data.session.access_token);

  document.getElementById("login-container").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregar();
  mostrarUsuario();
}

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

// PERFIL
async function buscarPerfil() {
  const res = await fetch("/perfil", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();
  return data.perfil;
}

// CARREGAR
async function carregar() {
  const perfil = await buscarPerfil();

  const res = await fetch("/transacoes", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  let dados = await res.json();

  if (perfil === "master") {
    menuAdmin.style.display = "inline-block";
  }

  if (perfil === "pagar") {
    dados = dados.filter(i => i.tipo === "pagar");
  }

  if (perfil === "receber") {
    dados = dados.filter(i => i.tipo === "receber");
  }

  let pagar = 0, receber = 0;
  tabela.innerHTML = "";

  dados.forEach(i => {
    const v = Number(i.valor);

    i.tipo === "pagar" ? pagar += v : receber += v;

    tabela.innerHTML += `
      <tr>
        <td>${i.tipo}</td>
        <td>${i.descricao}</td>
        <td>R$ ${v}</td>
        <td>${i.data.split("-").reverse().join("/")}</td>
        <td>${i.status}</td>
      </tr>
    `;
  });

  document.getElementById("pagar").innerText = pagar.toFixed(2);
  document.getElementById("receber").innerText = receber.toFixed(2);
  document.getElementById("saldo").innerText = (receber - pagar).toFixed(2);

  if (grafico) grafico.destroy();

  grafico = new Chart(document.getElementById("grafico"), {
    type: "bar",
    data: {
      labels: ["A Pagar", "A Receber"],
      datasets: [{
        label: "Valores",
        data: [pagar, receber]
      }]
    }
  });
}

// CRIAR USUÁRIO
async function criarUsuario() {
  const nome = novoNome.value;
  const email = novoEmail.value;
  const perfil = novoPerfil.value;

  const res = await fetch("/criar-usuario", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ nome, email, perfil })
  });

  const data = await res.json();
  alert("Senha: " + data.senha);
}

// NAVEGAÇÃO
function abrirPainel(tela) {
  telaDashboard.style.display = "none";
  adminPanel.style.display = "none";

  if (tela === "dashboard") telaDashboard.style.display = "block";
  if (tela === "usuarios") adminPanel.style.display = "block";
}

// USUÁRIO
async function mostrarUsuario() {
  const { data } = await supabaseClient.auth.getUser();

  if (data.user) {
    boasVindas.innerText = "Olá, " + data.user.email;
  }
}

verificarLogin();

</script>

</body>
</html>
