<!DOCTYPE html>
<html>
<head>
  <title>Painel Nexuflow</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      padding: 20px;
      background: white;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      margin-top: 30px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    canvas {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>💰 Painel Financeiro Nexuflow</h1>

<div class="cards">
  <div class="card">A Pagar: R$ <span id="pagar">0</span></div>
  <div class="card">A Receber: R$ <span id="receber">0</span></div>
  <div class="card">Saldo: R$ <span id="saldo">0</span></div>
</div>

<canvas id="grafico"></canvas>

<table>
  <thead>
    <tr>
      <th>Tipo</th>
      <th>Descrição</th>
      <th>Valor</th>
      <th>Data</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<script>
async function carregar() {
  const res = await fetch("/transacoes");
  const dados = await res.json();

  let totalPagar = 0;
  let totalReceber = 0;

  const tbody = document.getElementById("tabela");

  dados.forEach(item => {
    const valor = Number(item.valor);

    if (item.tipo === "pagar") {
      totalPagar += valor;
    } else {
      totalReceber += valor;
    }

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.tipo}</td>
      <td>${item.descricao}</td>
      <td>R$ ${valor}</td>
      <td>${item.data.split("-").reverse().join("/")}</td>
      <td>${item.status}</td>
    `;

    tbody.appendChild(tr);
  });

  // KPIs
  document.getElementById("pagar").innerText = totalPagar.toFixed(2);
  document.getElementById("receber").innerText = totalReceber.toFixed(2);
  document.getElementById("saldo").innerText = (totalReceber - totalPagar).toFixed(2);

  // Gráfico
  const ctx = document.getElementById("grafico");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["A Pagar", "A Receber"],
      datasets: [{
        label: "Valores",
        data: [totalPagar, totalReceber]
      }]
    }
  });
}

carregar();
</script>

</body>
</html>
