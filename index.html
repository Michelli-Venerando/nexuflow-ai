<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nexuflow</title>



  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    /* FUNDO LOGIN E RESET */
    #login-container, #reset-container {
      height: 100vh;
      background: url("/Imagens/plano-fundo.png") no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #login-container::before, #reset-container::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    /* BOX */
    .login-box {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.95);
      padding: 40px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .erro {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
    }

    /* APP */
    h1 { text-align: center; }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      padding: 20px;
      background: white;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      margin-top: 30px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
	
	#dashboard {
	display: none;
	}
  </style>
</head>
<body>

<div id="login-container">
  <div class="login-box">
  <h2>Login Nexuflow</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="erro" style="color:red;"></p>
  </div>
</div>

<div id="dashboard" style="display:none; padding:20px;">
  <h2>Dashboard</h2>

  <p id="nome"></p>
  <p id="empresa"></p>

  <button onclick="carregarTransacoes()">Ver Transações</button>

  <ul id="lista"></ul>

  <button onclick="logout()" style="background:#ef4444;">Sair</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://zwwdeetzpwrbtiyvfsjj.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3d2RlZXR6cHdyYnRpeXZmc2pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODY4MTksImV4cCI6MjA4OTg2MjgxOX0.OKuhe5_umIl6R-F41FjWr_NctpO6T8qZ7KAhHVuGBZk";

  //const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let supabaseClient;

if (!window._supabaseClient) {
  window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

supabaseClient = window._supabaseClient;

  // 🔐 LOGIN
  async function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: senha
    });

    if (error) {
      document.getElementById("erro").innerText = "Login inválido";
      return;
    }

    const token = data.session.access_token;

    // 🔥 SALVA TOKEN
    localStorage.setItem("token", token);

    carregarPerfil(token);
  }

  // 👤 PERFIL
  async function carregarPerfil(token) {
    try {
      const response = await fetch("/perfil", {
        headers: {
          Authorization: "Bearer " + token
        }
      });

      const data = await response.json();

      if (!data) {
        document.getElementById("erro").innerText = "Erro ao carregar perfil";
        return;
      }

      document.getElementById("login-container").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      // 🔥 FORMATA COMO VOCÊ QUERIA
      const nomeFinal =
        (data.perfil || "perfil") + " - " +
        (data.empresa || "Empresa") + " - " +
        (data.nome || data.email);

      document.getElementById("nome").innerText = nomeFinal;
      document.getElementById("empresa").innerText = "";

      window.TOKEN = token;

    } catch (erro) {
      console.error(erro);
      document.getElementById("erro").innerText = "Erro no servidor";
    }
  }

  // 💰 TRANSAÇÕES
  async function carregarTransacoes() {
    try {
      const response = await fetch("/transacoes", {
        headers: {
          Authorization: "Bearer " + window.TOKEN
        }
      });

      const data = await response.json();

      const lista = document.getElementById("lista");
      lista.innerHTML = "";

      if (!data || data.length === 0) {
        lista.innerHTML = "<li>Sem dados</li>";
        return;
      }

      data.forEach(t => {
        const li = document.createElement("li");
        li.innerText = `${t.descricao} - R$ ${t.valor}`;
        lista.appendChild(li);
      });

    } catch (erro) {
      console.error(erro);
      alert("Erro ao carregar transações");
    }
  }

  // 🚪 LOGOUT
  function logout() {
    localStorage.removeItem("token");
    location.reload();
  }

  // 🔄 AUTO LOGIN
  if (localStorage.getItem("token")) {
    carregarPerfil(localStorage.getItem("token"));
  }
</script>

</body>
</html>
