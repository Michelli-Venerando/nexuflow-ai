<!DOCTYPE html>
<html>
<head>
<!-- Painel Financeiro - Nexuflow -->
  <title>Painel Nexuflow</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }
	
	
	/* fundo */
	#login-container {
		height: 100vh;
		background: url("/Imagens/plano-fundo.png") no-repeat center center;
		background-size: cover;

		display: flex;
		justify-content: center;
		align-items: center;
	}
	
	/* efeito escuro */
	#login-container::before {
		content: "";
		position: absolute;
		width: 100%;
		height: 100%;
		background: rgba(0,0,0,0.5);
	}

	/* box */
	.login-box {
		position: relative;
		z-index: 1;

		background: rgba(255,255,255,0.95);
		padding: 40px;
		border-radius: 12px;
		width: 300px;
		text-align: center;

		box-shadow: 0 10px 30px rgba(0,0,0,0.3);
	}

	.login-box h2 {
		margin-bottom: 10px;
	}

	.login-box p {
		font-size: 14px;
		margin-bottom: 20px;
		color: #666;
	}

	.login-box input {
		width: 100%;
		padding: 10px;
		margin-bottom: 15px;
		border-radius: 6px;
		border: 1px solid #ccc;
	}

	.login-box button {
		width: 100%;
		padding: 10px;
		border: none;
		background: #4CAF50;
		color: white;
		border-radius: 6px;
		cursor: pointer;
		font-weight: bold;
	}

	.login-box button:hover {
		background: #45a049;
	}

    h1 {
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      padding: 20px;
      background: white;
      border-radius: 10px;
      text-align: center;
      font-size: 18px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      background: white;
      border-collapse: collapse;
      margin-top: 30px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    canvas {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div id="login-container">
  <div class="login-box">
    <h2>Nexuflow</h2>
    <p>Controle financeiro inteligente</p>

    <input id="email" type="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>
  </div>
</div>

<div id="app" style="display:none;">

<button onclick="logout()" style="float:right;">Sair</button>

<h1>💰 Painel Financeiro Nexuflow</h1>

<div class="cards">
  <div class="card">A Pagar: R$ <span id="pagar">0</span></div>
  <div class="card">A Receber: R$ <span id="receber">0</span></div>
  <div class="card">Saldo: R$ <span id="saldo">0</span></div>
</div>

<canvas id="grafico"></canvas>

<table>
  <thead>
    <tr>
      <th>Tipo</th>
      <th>Descrição</th>
      <th>Valor</th>
      <th>Data</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>

const { createClient } = supabase;

const supabaseClient = createClient(
  "https://zwwdeetzpwrbtiyvfsjj.supabase.co",
  "SUA_CHAVE_AQUI"
);

// verificar login
async function verificarLogin() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    localStorage.setItem("token", data.session.access_token);

    document.getElementById("login-container").style.display = "none";
    document.getElementById("app").style.display = "block";

    carregar();
  }
}

verificarLogin();

// login
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    alert("Erro no login");
    return;
  }

  localStorage.setItem("token", data.session.access_token);

  document.getElementById("login-container").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregar();
}

window.login = login;

// logout
async function logout() {
  await supabaseClient.auth.signOut();

  localStorage.removeItem("token");

  document.getElementById("login-container").style.display = "block";
  document.getElementById("app").style.display = "none";
}

window.logout = logout;

// carregar dados
async function carregar() {
  const res = await fetch("/transacoes", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const dados = await res.json();

  let totalPagar = 0;
  let totalReceber = 0;

  const tbody = document.getElementById("tabela");
  tbody.innerHTML = "";

  dados.forEach(item => {
    const valor = Number(item.valor);

    if (item.tipo === "pagar") {
      totalPagar += valor;
    } else {
      totalReceber += valor;
    }

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${item.tipo}</td>
      <td>${item.descricao}</td>
      <td>R$ ${valor}</td>
      <td>${item.data.split("-").reverse().join("/")}</td>
      <td>${item.status}</td>
    `;

    tbody.appendChild(tr);
  });

  document.getElementById("pagar").innerText = totalPagar.toFixed(2);
  document.getElementById("receber").innerText = totalReceber.toFixed(2);
  document.getElementById("saldo").innerText = (totalReceber - totalPagar).toFixed(2);

  const ctx = document.getElementById("grafico");

  new Chart(ctx, {
    type: "bar",
    data: {
      labels: ["A Pagar", "A Receber"],
      datasets: [{
        label: "Valores",
        data: [totalPagar, totalReceber]
      }]
    }
  });
}

</script>
</div>
</body>
</html>
