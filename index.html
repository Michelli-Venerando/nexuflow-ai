<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nexuflow — Painel Financeiro</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1d21;
      --muted: #5c6370;
      --accent: #99d6f9;
      --accent-dark: #5eb8eb;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    /* FUNDO LOGIN E RESET */
    #login-container, #reset-container {
      height: 100vh;
      background: url("/Imagens/plano-fundo.png") no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #login-container::before, #reset-container::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    /* BOX */
    .login-box {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.95);
      padding: 40px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .erro {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
    }

    #dashboard {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .dash-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .dash-header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }

    .dash-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .dash-meta #nome {
      color: var(--text);
      font-weight: 500;
    }

    .btn-sair {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: #fee2e2;
      color: #b91c1c;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .btn-sair:hover {
      background: #fecaca;
    }

    .dash-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    @media (max-width: 720px) {
      .dash-cards {
        grid-template-columns: 1fr;
      }
    }

    .dash-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 18px;
      text-align: center;
    }

    .dash-card-label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .dash-card-value {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .dash-card.saldo .dash-card-value {
      color: #0d9488;
    }

    .dash-card.saldo.negativo .dash-card-value {
      color: #dc2626;
    }

    .dash-chart-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px 28px;
      margin-bottom: 22px;
    }

    .dash-chart-wrap h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin: 0 0 16px;
      text-align: center;
    }

    .dash-chart-inner {
      position: relative;
      height: 280px;
      max-width: 520px;
      margin: 0 auto;
    }

    .dash-section-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 14px;
      color: var(--text);
    }

    .dash-table-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 20px 8px;
      overflow-x: auto;
    }

    .dash-table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .dash-table-wrap th,
    .dash-table-wrap td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid #eef0f3;
    }

    .dash-table-wrap th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .dash-table-wrap td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .dash-table-wrap .tipo-pagar {
      color: #dc2626;
    }

    .dash-table-wrap .tipo-receber {
      color: #059669;
    }

    .dash-loading {
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }

    .dash-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 12px 16px;
      margin-bottom: 20px;
      padding: 16px 18px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .dash-toolbar label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .dash-toolbar input[type="date"],
    .dash-toolbar input[type="text"],
    .dash-toolbar input[type="email"],
    .dash-toolbar input[type="password"],
    .dash-toolbar input[type="number"],
    .dash-toolbar select {
      padding: 8px 10px;
      border: 1px solid #dde1e6;
      border-radius: 8px;
      font-size: 0.9rem;
      min-width: 140px;
    }

    .btn-primary {
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .btn-primary:hover {
      background: #1d4ed8;
    }

    .btn-secondary {
      padding: 9px 16px;
      border: 1px solid #dde1e6;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .btn-secondary:hover {
      background: #f8fafc;
    }

    .btn-master {
      background: #0d9488;
      color: #fff;
    }

    .btn-master:hover {
      background: #0f766e;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.aberto {
      display: flex;
    }

    .modal-box {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
      max-width: 420px;
      width: 100%;
      padding: 24px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-box h3 {
      margin: 0 0 16px;
      font-size: 1.15rem;
    }

    .modal-box .campo {
      margin-bottom: 14px;
    }

    .modal-box .campo label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .modal-box .campo input,
    .modal-box .campo select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dde1e6;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .modal-acoes {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .modal-msg {
      font-size: 0.85rem;
      margin-top: 10px;
      min-height: 1.2em;
    }

    .modal-msg.erro {
      color: #dc2626;
    }

    .modal-msg.ok {
      color: #059669;
    }
  </style>
</head>
<body>

<div id="login-container">
  <div class="login-box">
  <h2>Login Nexuflow</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="erro" style="color:red;"></p>
  </div>
</div>

<div id="dashboard">
  <header class="dash-header">
    <h1>💰 Painel Financeiro Nexuflow</h1>
    <div class="dash-meta">
      <span id="nome"></span>
      <button type="button" id="btn-cadastrar-usuario" class="btn-secondary btn-master" style="display:none;" onclick="abrirModalUsuario()">Cadastrar usuário</button>
      <button type="button" class="btn-sair" onclick="logout()">Sair</button>
    </div>
  </header>

  <div class="dash-toolbar">
    <div>
      <label for="filtro-de">De</label>

    </div>
    <div>
      <label for="filtro-ate">Até</label>
      <input type="date" id="filtro-ate">
    </div>
    <div style="align-self:flex-end;">
      <button type="button" class="btn-secondary" onclick="limparFiltroDatas()">Limpar datas</button>
    </div>
    <div style="align-self:flex-end;">
      <button type="button" class="btn-primary" onclick="carregarTransacoes()">Aplicar filtro</button>
    </div>
    <div style="flex:1;min-width:8px;"></div>
    <div style="align-self:flex-end;">
      <button type="button" class="btn-primary" onclick="abrirModalLancamento()">Novo lançamento</button>
    </div>
  </div>

  <div class="dash-cards">
    <div class="dash-card">
      <span class="dash-card-label">A Pagar</span>
      <span class="dash-card-value" id="card-pagar">R$ 0,00</span>
    </div>
    <div class="dash-card">
      <span class="dash-card-label">A Receber</span>
      <span class="dash-card-value" id="card-receber">R$ 0,00</span>
    </div>
    <div class="dash-card saldo" id="card-saldo-wrap">
      <span class="dash-card-label">Saldo</span>
      <span class="dash-card-value" id="card-saldo">R$ 0,00</span>
    </div>
  </div>

  <div class="dash-chart-wrap">
    <h2>Valores</h2>
    <div class="dash-chart-inner">
      <canvas id="graficoFin" aria-label="Gráfico A Pagar e A Receber"></canvas>
    </div>
  </div>

  <h3 class="dash-section-title">Movimentações</h3>
  <div class="dash-table-wrap">
    <div id="lista-status" class="dash-loading">Carregando…</div>
    <table id="tabela-mov" style="display:none;">
      <thead>
        <tr>
          <th>Data</th>
          <th>Descrição</th>
          <th>Tipo</th>
          <th class="num">Valor</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>
</div>

<div id="modal-usuario" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-usuario">
  <div class="modal-box">
    <h3 id="titulo-modal-usuario">Cadastrar usuário</h3>
    <div class="campo">
      <label for="novo-user-nome">Nome</label>
      <input type="text" id="novo-user-nome" placeholder="Nome completo" autocomplete="name">
    </div>
    <div class="campo">
      <label for="novo-user-email">E-mail</label>
      <input type="email" id="novo-user-email" placeholder="email@empresa.com" autocomplete="off">
    </div>
    <div class="campo">
      <label for="novo-user-senha">Senha</label>
      <input type="password" id="novo-user-senha" placeholder="Mín. 6 caracteres" autocomplete="new-password">
    </div>
    <div class="campo">
      <label for="novo-user-perfil">Perfil</label>
      <select id="novo-user-perfil">
        <option value="operador">Operador</option>
        <option value="mestre">Master</option>
      </select>
    </div>
    <p id="msg-modal-usuario" class="modal-msg"></p>
    <div class="modal-acoes">
      <button type="button" class="btn-secondary" onclick="fecharModalUsuario()">Cancelar</button>
      <button type="button" class="btn-primary" onclick="salvarNovoUsuario()">Salvar</button>
    </div>
  </div>
</div>

<div id="modal-lancamento" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-lanc">
  <div class="modal-box">
    <h3 id="titulo-modal-lanc">Novo lançamento</h3>
    <div class="campo">
      <label for="lanc-desc">Descrição</label>
      <input type="text" id="lanc-desc" placeholder="Ex.: Internet">
    </div>
    <div class="campo">
      <label for="lanc-tipo">Tipo</label>
      <select id="lanc-tipo">
        <option value="pagar">A pagar</option>
        <option value="receber">A receber</option>
      </select>
    </div>
    <div class="campo">
      <label for="lanc-valor">Valor (R$)</label>
      <input type="text" id="lanc-valor" inputmode="decimal" placeholder="0,00" autocomplete="off">
    </div>
    <div class="campo">
      <label for="lanc-data">Data</label>
      <input type="date" id="lanc-data">
    </div>
    <p id="msg-modal-lanc" class="modal-msg"></p>
    <div class="modal-acoes">
      <button type="button" class="btn-secondary" onclick="fecharModalLancamento()">Cancelar</button>
      <button type="button" class="btn-primary" onclick="salvarLancamento()">Salvar</button>
    </div>
  </div>
</div>

  // 🔐 LOGIN
  async function login() {
    const email = document.getElementById("email").value;

  // 👤 PERFIL
  async function carregarPerfil(token) {
    try {
      const response = await fetch("/perfil", {
        headers: {
          Authorization: "Bearer " + token
        }
      });

      const data = await response.json();

      if (!response.ok || data.error) {
        document.getElementById("erro").innerText =

        return;

      document.getElementById("login-container").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      function labelPerfil(p) {
        const x = String(p || "").toLowerCase();
        if (x === "mestre" || x === "master") return "Master";
        if (!p) return "Master";
        return p.charAt(0).toUpperCase() + p.slice(1);
      }

      function nomeEmpresaParaExibir(nomeEmpresa, perfilRaw) {
        let s = String(nomeEmpresa || "").trim();
        const pr = String(perfilRaw || "").toLowerCase();
        if (pr === "mestre" || pr === "master") {
          s = s.replace(/^mestre[\s\-–]+/i, "").trim();
        }
        return s || "Empresa";
      }

      const perfilTxt = labelPerfil(data.perfil);
      const empresaNome =
        data.empresa_nome || data.empresa || "";

        "Olá " + perfilTxt + " - " + empresaTxt + " - " + nomePessoa;

  function parseValorEntrada(v) {
    if (typeof v === "number" && Number.isFinite(v)) return v;
    let s = String(v ?? "")
      .trim()
      .replace(/\s/g, "");
    if (!s) return NaN;
    const lastComma = s.lastIndexOf(",");
    const lastDot = s.lastIndexOf(".");
    if (lastComma > lastDot) {
      s = s.replace(/\./g, "").replace(",", ".");
    } else if (lastComma >= 0 && lastDot < 0) {
      s = s.replace(",", ".");
    } else {
      s = s.replace(/,/g, "");
    }
    const n = Number(s);
    return Number.isFinite(n) ? n : NaN;
  }

  function formatBRL(n) {
    const x = Number(n);
    if (!Number.isFinite(x)) return "R$ 0,00";
    return x.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });
  }

  function numValor(t) {
    const v = t.valor ?? t.valentia;
    const n = parseValorEntrada(v);
    return Number.isFinite(n) ? n : 0;
  }

  function textoCelulaData(row) {
    const raw = row.dados ?? row.data ?? row.data_lancamento;
    if (raw == null || raw === "") return "—";
    const s = String(raw).trim();
    const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
    const br = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (br) return s;
    const t = Date.parse(s);
    if (!Number.isNaN(t)) {
      const d = new Date(t);
      const dd = String(d.getDate()).padStart(2, "0");
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const yy = d.getFullYear();
      return `${dd}/${mm}/${yy}`;
    }
    return s;
  }

  function limparFiltroDatas() {
    const de = document.getElementById("filtro-de");
    const ate = document.getElementById("filtro-ate");
    if (de) de.value = "";
    if (ate) ate.value = "";
    carregarTransacoes();
  }

  function abrirModalUsuario() {
    const el = document.getElementById("modal-usuario");
    const msg = document.getElementById("msg-modal-usuario");
    if (msg) {
      msg.textContent = "";
      msg.className = "modal-msg";
    }
    if (el) el.classList.add("aberto");
  }

  function fecharModalUsuario() {
    const el = document.getElementById("modal-usuario");
    if (el) el.classList.remove("aberto");
  }

  function abrirModalLancamento() {
    const el = document.getElementById("modal-lancamento");
    const msg = document.getElementById("msg-modal-lanc");
    const dataInp = document.getElementById("lanc-data");
    if (dataInp && !dataInp.value) {
      dataInp.value = new Date().toISOString().slice(0, 10);
    }
    if (msg) {
      msg.textContent = "";
      msg.className = "modal-msg";
    }
    if (el) el.classList.add("aberto");
  }

  function fecharModalLancamento() {
    const el = document.getElementById("modal-lancamento");
    if (el) el.classList.remove("aberto");
  }

  async function salvarNovoUsuario() {
    const msg = document.getElementById("msg-modal-usuario");
    const nome = document.getElementById("novo-user-nome")?.value?.trim();
    const email = document.getElementById("novo-user-email")?.value?.trim();
    const password = document.getElementById("novo-user-senha")?.value || "";
    const perfil = document.getElementById("novo-user-perfil")?.value || "operador";

    if (msg) {
      msg.textContent = "";
      msg.className = "modal-msg";
    }

    try {
      const response = await fetch("/usuarios", {
        method: "POST",
        headers: {
          Authorization: "Bearer " + window.TOKEN,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ nome, email, password, perfil })
      });
      const corpo = await response.text();
      let j;
      try {
        j = corpo ? JSON.parse(corpo) : {};
      } catch {
        j = {};
      }
      if (!response.ok) {
        if (msg) {
          msg.textContent = j.error || corpo.slice(0, 200) || "Erro ao cadastrar";
          msg.classList.add("erro");
        }
        return;
      }
      document.getElementById("novo-user-nome").value = "";
      document.getElementById("novo-user-email").value = "";
      document.getElementById("novo-user-senha").value = "";
      fecharModalUsuario();
    } catch (e) {
      console.error(e);
      if (msg) {
        msg.textContent = "Falha de rede ao cadastrar.";
        msg.classList.add("erro");
      }
    }
  }

  async function salvarLancamento() {
    const msg = document.getElementById("msg-modal-lanc");
    const descricao = document.getElementById("lanc-desc")?.value?.trim();
    const tipo = document.getElementById("lanc-tipo")?.value;
    const valor = parseValorEntrada(
      document.getElementById("lanc-valor")?.value
    );
    const dados = document.getElementById("lanc-data")?.value;

    if (msg) {
      msg.textContent = "";
      msg.className = "modal-msg";
    }

    if (!Number.isFinite(valor) || valor <= 0) {
      if (msg) {
        msg.textContent =
          "Informe um valor válido (ex.: 50 ou 50,00).";
        msg.classList.add("erro");
      }
      return;
    }

    try {
      const response = await fetch("/transacoes", {
        method: "POST",
        headers: {
          Authorization: "Bearer " + window.TOKEN,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          descricao,
          tipo,
          valor,
          dados: dados || undefined
        })
      });
      const corpo = await response.text();
      let j;
      try {
        j = corpo ? JSON.parse(corpo) : {};
      } catch {
        j = {};
      }
      if (!response.ok) {
        if (msg) {
          msg.textContent = j.error || j.detalhe || corpo.slice(0, 160) || "Erro ao salvar";
          msg.classList.add("erro");
        }
        return;
      }
      fecharModalLancamento();
      document.getElementById("lanc-desc").value = "";
      document.getElementById("lanc-valor").value = "";
      carregarTransacoes();
    } catch (e) {
      console.error(e);
      if (msg) {
        msg.textContent = "Falha de rede ao salvar.";
        msg.classList.add("erro");
      }
    }
  }

  function tipoMovimento(t) {
    const x = String(t.tipo || "")
      .toLowerCase()
      .trim()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
    if (x === "pagar" || x === "pago" || x === "despesa" || x === "saida")
      return "pagar";
    if (
      x === "receber" ||
      x === "recebido" ||
      x === "receita" ||
      x === "entrada"
    )
      return "receber";
    return x || "outro";
  }

  function atualizarGrafico(aPagar, aReceber) {
    const canvas = document.getElementById("graficoFin");
    if (!canvas || typeof Chart === "undefined") return;

    if (window._chartFin) {
      window._chartFin.destroy();
      window._chartFin = null;
    }

    window._chartFin = new Chart(canvas.getContext("2d"), {
      type: "bar",
      data: {
        labels: ["A Pagar", "A Receber"],
        datasets: [
          {
            label: "Valores",
            data: [aPagar, aReceber],
            backgroundColor: "#99d6f9",
            borderRadius: 8,
            maxBarThickness: 72
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: "top",
            labels: {
              usePointStyle: true,
              boxWidth: 10,
              color: "#5c6370"
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: "#e8eaed" },
            ticks: {
              color: "#5c6370",
              callback: function (v) {
                return Number(v).toLocaleString("pt-BR");
              }
            }
          },
          x: {
            grid: { display: false },
            ticks: { color: "#5c6370" }
          }
        }
      }
    });
  }

  async function carregarTransacoes() {
    const tbody = document.getElementById("lista");
    const statusEl = document.getElementById("lista-status");
    const tabela = document.getElementById("tabela-mov");

    try {
      if (statusEl) {
        statusEl.style.display = "block";
        statusEl.textContent = "Carregando…";
      }
      if (tabela) tabela.style.display = "none";
      tbody.innerHTML = "";

      const de = document.getElementById("filtro-de")?.value || "";
      const ate = document.getElementById("filtro-ate")?.value || "";
      let urlTrans = "/transacoes";
      const qs = new URLSearchParams();
      if (de) qs.set("de", de);
      if (ate) qs.set("ate", ate);
      const q = qs.toString();
      if (q) urlTrans += "?" + q;

      const response = await fetch(urlTrans, {
        headers: {
          Authorization: "Bearer " + window.TOKEN
        }
      });

      const corpo = await response.text();
      let data;
      try {
        data = corpo ? JSON.parse(corpo) : null;
      } catch {
        data = null;
      }

      if (!response.ok) {
        const msg =
          (data && data.error) ||
          (data && data.detalhe) ||
          corpo.slice(0, 120) ||
          "Erro ao carregar transações";
        if (statusEl) {
          statusEl.textContent = msg;
          statusEl.style.display = "block";
        }
        atualizarGrafico(0, 0);
        document.getElementById("card-pagar").textContent = formatBRL(0);
        document.getElementById("card-receber").textContent = formatBRL(0);
        document.getElementById("card-saldo").textContent = formatBRL(0);
        return;
      }

      if (!Array.isArray(data) || data.length === 0) {
        if (statusEl) {
          statusEl.textContent = "Sem movimentações no período.";
          statusEl.style.display = "block";
        }
        atualizarGrafico(0, 0);
        document.getElementById("card-pagar").textContent = formatBRL(0);
        document.getElementById("card-receber").textContent = formatBRL(0);
        document.getElementById("card-saldo").textContent = formatBRL(0);
        return;
      }

      if (statusEl) statusEl.style.display = "none";
      if (tabela) tabela.style.display = "table";

      let totalPagar = 0;
      let totalReceber = 0;

      data.forEach((t) => {
        const valor = numValor(t);
        const mov = tipoMovimento(t);
        if (mov === "pagar") totalPagar += valor;
        else if (mov === "receber") totalReceber += valor;

        const desc =
          t.descricao ?? t["descrição"] ?? "—";
        const tr = document.createElement("tr");
        const tdData = document.createElement("td");
        tdData.textContent = textoCelulaData(t);
        const tdD = document.createElement("td");
        tdD.textContent = desc;
        const tdT = document.createElement("td");
        const tipoLabel =
          mov === "pagar"
            ? "Pagar"
            : mov === "receber"
              ? "Receber"
              : String(t.tipo || "—");
        tdT.textContent = tipoLabel;
        tdT.className =
          mov === "pagar"
            ? "tipo-pagar"
            : mov === "receber"
              ? "tipo-receber"
              : "";
        const tdV = document.createElement("td");
        tdV.className = "num";
        tdV.textContent = formatBRL(valor);
        tr.appendChild(tdData);
        tr.appendChild(tdD);
        tr.appendChild(tdT);
        tr.appendChild(tdV);
        tbody.appendChild(tr);
      });

      const saldo = totalReceber - totalPagar;
      document.getElementById("card-pagar").textContent = formatBRL(totalPagar);
      document.getElementById("card-receber").textContent =
        formatBRL(totalReceber);
      document.getElementById("card-saldo").textContent = formatBRL(saldo);

      const saldoWrap = document.getElementById("card-saldo-wrap");
      if (saldoWrap) {
        saldoWrap.classList.toggle("negativo", saldo < 0);
      }

      atualizarGrafico(totalPagar, totalReceber);
    } catch (erro) {
      console.error(erro);
      if (statusEl) {
        statusEl.style.display = "block";
        statusEl.textContent = "Erro ao carregar transações.";
      }
    }
  }

  // 🚪 LOGOUT
  function logout() {
    localStorage.removeItem("token");
    location.reload();
  }

  // 🔄 AUTO LOGIN
  if (localStorage.getItem("token")) {
    carregarPerfil(localStorage.getItem("token"));
  }
</script>
