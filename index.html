<!DOCTYPE html>
<html>
<head>
  <title>Painel Financeiro - Nexuflow</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    #login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #222;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
    }

    #app {
      display: none;
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
    }

    .card {
      flex: 1;
      padding: 20px;
      background: white;
      border-radius: 10px;
      text-align: center;
    }

    table {
      width: 100%;
      background: white;
      margin-top: 20px;
      border-collapse: collapse;
    }

    td, th {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login-container">
  <div class="login-box">
    <h2>Nexuflow</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <p id="erroLogin" style="color:red;"></p>

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
    <div><b id="usuario"></b></div>
    <button onclick="logout()">Sair</button>
  </div>

  <h1>💰 Painel Financeiro</h1>

  <div>
    <button onclick="abrirPainel('dashboard')">Dashboard</button>
    <button id="menu-admin" onclick="abrirPainel('usuarios')" style="display:none;">
      Gestão de Usuários
    </button>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <div class="cards">
      <div class="card">A Pagar: R$ <span id="pagar">0</span></div>
      <div class="card">A Receber: R$ <span id="receber">0</span></div>
      <div class="card">Saldo: R$ <span id="saldo">0</span></div>
    </div>

    <canvas id="grafico"></canvas>

    <table>
      <thead>
        <tr>
          <th>Tipo</th>
          <th>Descrição</th>
          <th>Valor</th>
          <th>Data</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tabela"></tbody>
    </table>
  </div>

  <!-- USUÁRIOS -->
  <div id="usuarios" style="display:none;">
    <h3>Gestão de Usuários</h3>

    <input id="novoNome" placeholder="Nome">
    <input id="novoEmail" placeholder="Email">

    <select id="novoPerfil">
      <option value="pagar">Contas a Pagar</option>
      <option value="receber">Contas a Receber</option>
      <option value="master">Master</option>
    </select>

    <button onclick="criarUsuario()">Criar Usuário</button>
  </div>

</div>

<script>
const { createClient } = supabase;

const supabaseClient = createClient(
  "https://zwwdeetzpwrbtiyvfsjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3d2RlZXR6cHdyYnRpeXZmc2pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODY4MTksImV4cCI6MjA4OTg2MjgxOX0.OKuhe5_umIl6R-F41FjWr_NctpO6T8qZ7KAhHVuGBZk"
);

let grafico;

// LOGIN AUTO
async function verificarLogin() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    localStorage.setItem("token", data.session.access_token);
    iniciarSistema();
  }
}

// LOGIN
async function login() {
  const email = emailInput.value;
  const senha = senhaInput.value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    erroLogin.innerText = "Email ou senha inválidos";
    return;
  }

  localStorage.setItem("token", data.session.access_token);
  iniciarSistema();
}

// INICIAR
function iniciarSistema() {
  login-container.style.display = "none";
  app.style.display = "block";

  carregarPerfil();
  carregarDados();
}

// PERFIL
async function carregarPerfil() {
  const res = await fetch("/perfil", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const data = await res.json();

  usuario.innerText =
    (data.empresa || "Empresa") +
    " - " +
    (data.nome || data.email);

  if (data.perfil === "master") {
    menu-admin.style.display = "inline-block";
  }
}

// DADOS
async function carregarDados() {
  const res = await fetch("/transacoes", {
    headers: {
      Authorization: "Bearer " + localStorage.getItem("token")
    }
  });

  const dados = await res.json();

  let pagar = 0, receber = 0;
  tabela.innerHTML = "";

  dados.forEach(i => {
    const v = Number(i.valor);

    if (i.tipo === "pagar") pagar += v;
    else receber += v;

    tabela.innerHTML += `
      <tr>
        <td>${i.tipo}</td>
        <td>${i.descricao}</td>
        <td>${v}</td>
        <td>${i.data}</td>
        <td>${i.status}</td>
      </tr>
    `;
  });

  pagarEl.innerText = pagar.toFixed(2);
  receberEl.innerText = receber.toFixed(2);
  saldo.innerText = (receber - pagar).toFixed(2);

  if (grafico) grafico.destroy();

  grafico = new Chart(graficoCanvas, {
    type: "bar",
    data: {
      labels: ["Pagar", "Receber"],
      datasets: [{
        data: [pagar, receber]
      }]
    }
  });
}

// USUÁRIO
async function criarUsuario() {
  const res = await fetch("/criar-usuario", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      nome: novoNome.value,
      email: novoEmail.value,
      perfil: novoPerfil.value
    })
  });

  const data = await res.json();
  alert("Senha: " + data.senha);
}

// NAV
function abrirPainel(tela) {
  dashboard.style.display = "none";
  usuarios.style.display = "none";

  if (tela === "dashboard") dashboard.style.display = "block";
  if (tela === "usuarios") usuarios.style.display = "block";
}

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

verificarLogin();
</script>

</body>
</html>
