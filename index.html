<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Nexuflow — Painel Financeiro</title>
  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1a1d21;
      --muted: #5c6370;
      --accent: #99d6f9;
      --accent-dark: #5eb8eb;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    /* FUNDO LOGIN E RESET */
    #login-container, #reset-container {
      height: 100vh;
      background: url("/Imagens/plano-fundo.png") no-repeat center center;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #login-container::before, #reset-container::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    /* BOX */
    .login-box {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.95);
      padding: 40px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #4CAF50;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .erro {
      color: red;
      font-size: 14px;
      margin-bottom: 10px;
    }

    #dashboard {
      display: none;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 48px;
    }

    .dash-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .dash-header h1 {
      font-size: 1.65rem;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }

    .dash-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .dash-meta #nome {
      color: var(--text);
      font-weight: 500;
    }

    .btn-sair {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: #fee2e2;
      color: #b91c1c;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .btn-sair:hover {
      background: #fecaca;
    }

    .dash-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }

    @media (max-width: 720px) {
      .dash-cards {
        grid-template-columns: 1fr;
      }
    }

    .dash-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px 18px;
      text-align: center;
    }

    .dash-card-label {
      display: block;
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .dash-card-value {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .dash-card.saldo .dash-card-value {
      color: #0d9488;
    }

    .dash-card.saldo.negativo .dash-card-value {
      color: #dc2626;
    }

    .dash-chart-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 20px 28px;
      margin-bottom: 22px;
    }

    .dash-chart-wrap h2 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin: 0 0 16px;
      text-align: center;
    }

    .dash-chart-inner {
      position: relative;
      height: 280px;
      max-width: 520px;
      margin: 0 auto;
    }

    .dash-section-title {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 14px;
      color: var(--text);
    }

    .dash-table-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 20px 8px;
      overflow-x: auto;
    }

    .dash-table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .dash-table-wrap th,
    .dash-table-wrap td {
      padding: 12px 10px;
      text-align: left;
      border-bottom: 1px solid #eef0f3;
    }

    .dash-table-wrap th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .dash-table-wrap td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .dash-table-wrap .tipo-pagar {
      color: #dc2626;
    }

    .dash-table-wrap .tipo-receber {
      color: #059669;
    }

    .dash-loading {
      text-align: center;
      color: var(--muted);
      padding: 24px;
    }
  </style>
</head>
<body>

<div id="login-container">
  <div class="login-box">
  <h2>Login Nexuflow</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Senha">

  <button onclick="login()">Entrar</button>

  <p id="erro" style="color:red;"></p>
  </div>
</div>

<div id="dashboard">
  <header class="dash-header">
    <h1>💰 Painel Financeiro Nexuflow</h1>
    <div class="dash-meta">
      <span id="nome"></span>
      <button type="button" class="btn-sair" onclick="logout()">Sair</button>
    </div>
  </header>

  <div class="dash-cards">
    <div class="dash-card">
      <span class="dash-card-label">A Pagar</span>
      <span class="dash-card-value" id="card-pagar">R$ 0,00</span>
    </div>
    <div class="dash-card">
      <span class="dash-card-label">A Receber</span>
      <span class="dash-card-value" id="card-receber">R$ 0,00</span>
    </div>
    <div class="dash-card saldo" id="card-saldo-wrap">
      <span class="dash-card-label">Saldo</span>
      <span class="dash-card-value" id="card-saldo">R$ 0,00</span>
    </div>
  </div>

  <div class="dash-chart-wrap">
    <h2>Valores</h2>
    <div class="dash-chart-inner">
      <canvas id="graficoFin" aria-label="Gráfico A Pagar e A Receber"></canvas>
    </div>
  </div>

  <h3 class="dash-section-title">Movimentações</h3>
  <div class="dash-table-wrap">
    <div id="lista-status" class="dash-loading">Carregando…</div>
    <table id="tabela-mov" style="display:none;">
      <thead>
        <tr>
          <th>Descrição</th>
          <th>Tipo</th>
          <th class="num">Valor</th>
        </tr>
      </thead>
      <tbody id="lista"></tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://zwwdeetzpwrbtiyvfsjj.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3d2RlZXR6cHdyYnRpeXZmc2pqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODY4MTksImV4cCI6MjA4OTg2MjgxOX0.OKuhe5_umIl6R-F41FjWr_NctpO6T8qZ7KAhHVuGBZk";

  //const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  let supabaseClient;

if (!window._supabaseClient) {
  window._supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
}

supabaseClient = window._supabaseClient;

  // 🔐 LOGIN
  async function login() {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: senha
    });

    if (error) {
      document.getElementById("erro").innerText = "Login inválido";
      return;
    }

    const token = data.session.access_token;

    // 🔥 SALVA TOKEN
    localStorage.setItem("token", token);

    carregarPerfil(token);
  }

  // 👤 PERFIL
  async function carregarPerfil(token) {
    try {
      const response = await fetch("/perfil", {
        headers: {
          Authorization: "Bearer " + token
        }
      });

      const data = await response.json();

      if (!response.ok || data.error) {
        document.getElementById("erro").innerText =
          data.error || "Erro ao carregar perfil";
        return;
      }

      document.getElementById("login-container").style.display = "none";
      document.getElementById("dashboard").style.display = "block";

      function labelPerfil(p) {
        const x = String(p || "").toLowerCase();
        if (x === "mestre" || x === "master") return "Master";
        if (!p) return "Master";
        return p.charAt(0).toUpperCase() + p.slice(1);
      }

      const perfilTxt = labelPerfil(data.perfil);
      let empresaTxt = data.empresa || "";
      if (/^mestre-/i.test(empresaTxt)) {
        empresaTxt = empresaTxt.replace(/^mestre-/i, "");
      }

      const nomeFinal =
        "Olá " +
        perfilTxt +
        "-" +
        empresaTxt +
        " - " +
        (data.nome || data.email);

      document.getElementById("nome").innerText = nomeFinal;

      window.TOKEN = token;
      carregarTransacoes();

    } catch (erro) {
      console.error(erro);
      document.getElementById("erro").innerText = "Erro no servidor";
    }
  }

  function formatBRL(n) {
    const x = Number(n);
    if (!Number.isFinite(x)) return "R$ 0,00";
    return x.toLocaleString("pt-BR", {
      style: "currency",
      currency: "BRL"
    });
  }

  function numValor(t) {
    const v = t.valor ?? t.valentia;
    const n = Number(v);
    return Number.isFinite(n) ? n : 0;
  }

  function tipoMovimento(t) {
    const x = String(t.tipo || "")
      .toLowerCase()
      .trim()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");
    if (x === "pagar" || x === "pago" || x === "despesa" || x === "saida")
      return "pagar";
    if (
      x === "receber" ||
      x === "recebido" ||
      x === "receita" ||
      x === "entrada"
    )
      return "receber";
    return x || "outro";
  }

  function atualizarGrafico(aPagar, aReceber) {
    const canvas = document.getElementById("graficoFin");
    if (!canvas || typeof Chart === "undefined") return;

    if (window._chartFin) {
      window._chartFin.destroy();
      window._chartFin = null;
    }

    window._chartFin = new Chart(canvas.getContext("2d"), {
      type: "bar",
      data: {
        labels: ["A Pagar", "A Receber"],
        datasets: [
          {
            label: "Valores",
            data: [aPagar, aReceber],
            backgroundColor: "#99d6f9",
            borderRadius: 8,
            maxBarThickness: 72
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            display: true,
            position: "top",
            labels: {
              usePointStyle: true,
              boxWidth: 10,
              color: "#5c6370"
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            grid: { color: "#e8eaed" },
            ticks: {
              color: "#5c6370",
              callback: function (v) {
                return Number(v).toLocaleString("pt-BR");
              }
            }
          },
          x: {
            grid: { display: false },
            ticks: { color: "#5c6370" }
          }
        }
      }
    });
  }

  async function carregarTransacoes() {
    const tbody = document.getElementById("lista");
    const statusEl = document.getElementById("lista-status");
    const tabela = document.getElementById("tabela-mov");

    try {
      if (statusEl) {
        statusEl.style.display = "block";
        statusEl.textContent = "Carregando…";
      }
      if (tabela) tabela.style.display = "none";
      tbody.innerHTML = "";

      const response = await fetch("/transacoes", {
        headers: {
          Authorization: "Bearer " + window.TOKEN
        }
      });

      const corpo = await response.text();
      let data;
      try {
        data = corpo ? JSON.parse(corpo) : null;
      } catch {
        data = null;
      }

      if (!response.ok) {
        const msg =
          (data && data.error) ||
          (data && data.detalhe) ||
          corpo.slice(0, 120) ||
          "Erro ao carregar transações";
        if (statusEl) {
          statusEl.textContent = msg;
          statusEl.style.display = "block";
        }
        atualizarGrafico(0, 0);
        document.getElementById("card-pagar").textContent = formatBRL(0);
        document.getElementById("card-receber").textContent = formatBRL(0);
        document.getElementById("card-saldo").textContent = formatBRL(0);
        return;
      }

      if (!Array.isArray(data) || data.length === 0) {
        if (statusEl) {
          statusEl.textContent = "Sem movimentações no período.";
          statusEl.style.display = "block";
        }
        atualizarGrafico(0, 0);
        document.getElementById("card-pagar").textContent = formatBRL(0);
        document.getElementById("card-receber").textContent = formatBRL(0);
        document.getElementById("card-saldo").textContent = formatBRL(0);
        return;
      }

      if (statusEl) statusEl.style.display = "none";
      if (tabela) tabela.style.display = "table";

      let totalPagar = 0;
      let totalReceber = 0;

      data.forEach((t) => {
        const valor = numValor(t);
        const mov = tipoMovimento(t);
        if (mov === "pagar") totalPagar += valor;
        else if (mov === "receber") totalReceber += valor;

        const desc =
          t.descricao ?? t["descrição"] ?? "—";
        const tr = document.createElement("tr");
        const tdD = document.createElement("td");
        tdD.textContent = desc;
        const tdT = document.createElement("td");
        const tipoLabel =
          mov === "pagar"
            ? "Pagar"
            : mov === "receber"
              ? "Receber"
              : String(t.tipo || "—");
        tdT.textContent = tipoLabel;
        tdT.className =
          mov === "pagar"
            ? "tipo-pagar"
            : mov === "receber"
              ? "tipo-receber"
              : "";
        const tdV = document.createElement("td");
        tdV.className = "num";
        tdV.textContent = formatBRL(valor);
        tr.appendChild(tdD);
        tr.appendChild(tdT);
        tr.appendChild(tdV);
        tbody.appendChild(tr);
      });

      const saldo = totalReceber - totalPagar;
      document.getElementById("card-pagar").textContent = formatBRL(totalPagar);
      document.getElementById("card-receber").textContent =
        formatBRL(totalReceber);
      document.getElementById("card-saldo").textContent = formatBRL(saldo);

      const saldoWrap = document.getElementById("card-saldo-wrap");
      if (saldoWrap) {
        saldoWrap.classList.toggle("negativo", saldo < 0);
      }

      atualizarGrafico(totalPagar, totalReceber);
    } catch (erro) {
      console.error(erro);
      if (statusEl) {
        statusEl.style.display = "block";
        statusEl.textContent = "Erro ao carregar transações.";
      }
    }
  }

  // 🚪 LOGOUT
  function logout() {
    localStorage.removeItem("token");
    location.reload();
  }

  // 🔄 AUTO LOGIN
  if (localStorage.getItem("token")) {
    carregarPerfil(localStorage.getItem("token"));
  }
</script>

</body>
</html>
